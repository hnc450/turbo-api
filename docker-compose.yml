services:
   backend:
      build: .
      ports:
         - "8000:8000"
      volumes:
         - ./:/home
      depends_on:
        - database
      
   database:
      image: mysql
      restart: always

      environment:
         -  MYSQL_ROOT_PASSWORD: 1234
         -  MYSQL_DATABASE: turbo
      ports:
          - "3307:3306"
      
      volumes:
         - ./database/database.sql: /docker-entrypoint-initdb.d/init.sql
         - db_data: /var/lib/mysql

volumes:
   db_data: 